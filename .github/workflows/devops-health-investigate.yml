name: devops-health-investigate

on:
  workflow_dispatch:
    inputs:
      finding_id:
        description: 'Fingerprint ID of the finding to investigate'
        required: true
        type: string
      finding_type:
        description: 'Category: pipeline | quality | pr | infra | resource'
        required: true
        type: string
      finding_title:
        description: 'Human-readable title of the finding'
        required: true
        type: string
      finding_severity:
        description: 'Severity: critical | warning | info'
        required: true
        type: string
      resource_url:
        description: 'URL to the primary resource (run, PR, etc.)'
        required: true
        type: string
      health_issue_number:
        description: 'Issue number of the pinned health dashboard'
        required: true
        type: string
      correlation_id:
        description: 'Unique ID linking this investigation to the health check run'
        required: true
        type: string

concurrency:
  group: devops-health-investigate-${{ github.event.inputs.finding_id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

jobs:
  investigate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select random Copilot token
        id: select-token
        env:
          TOKEN_1: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          TOKEN_2: ${{ secrets.COPILOT_GITHUB_TOKEN_2 }}
          TOKEN_3: ${{ secrets.COPILOT_GITHUB_TOKEN_3 }}
          TOKEN_4: ${{ secrets.COPILOT_GITHUB_TOKEN_4 }}
          TOKEN_5: ${{ secrets.COPILOT_GITHUB_TOKEN_5 }}
          TOKEN_6: ${{ secrets.COPILOT_GITHUB_TOKEN_6 }}
          TOKEN_7: ${{ secrets.COPILOT_GITHUB_TOKEN_7 }}
          TOKEN_8: ${{ secrets.COPILOT_GITHUB_TOKEN_8 }}
        run: |
          TOKENS=()
          NAMES=()
          for i in 1 2 3 4 5 6 7 8; do
            var="TOKEN_$i"; val="${!var}"
            if [ -n "$val" ]; then
              TOKENS+=("$val")
              if [ "$i" -eq 1 ]; then NAMES+=("COPILOT_GITHUB_TOKEN")
              else NAMES+=("COPILOT_GITHUB_TOKEN_$i"); fi
            fi
          done
          if [ ${#TOKENS[@]} -eq 0 ]; then
            echo "::error::No COPILOT_GITHUB_TOKEN secrets are configured"
            exit 1
          fi
          IDX=$((RANDOM % ${#TOKENS[@]}))
          echo "Selected ${NAMES[$IDX]} (1 of ${#TOKENS[@]} available tokens)"
          echo "::add-mask::${TOKENS[$IDX]}"
          echo "token=${TOKENS[$IDX]}" >> $GITHUB_OUTPUT

      - name: Run investigation agentic workflow
        env:
          GITHUB_TOKEN: ${{ steps.select-token.outputs.token }}
        run: gh aw run eng/agentic-workflows/devops-health-investigate.md --wait
